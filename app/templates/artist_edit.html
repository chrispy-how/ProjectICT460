{% extends "base.html" %}

{% block main %}

<div class="row mt-4">
    <div class="col-md-6 offset-md-3">
        <div class="card shadow-sm">
            <div class="card-header bg-light">
                <h4 class="mb-0">Edit Artist</h4>
            </div>
            <div class="card-body">
                {% if error_msg %}
                <div class="alert alert-danger">{{ error_msg }}</div>
                {% endif %}
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Artist Name:</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ artist.Name }}" required maxlength="120">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{{ url_for('artists') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock main %}

{% block footer %}
<p>Footer</p>
{% endblock footer %}
